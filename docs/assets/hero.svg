  <text x="326" y="135" fill="#FFFFFF" font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="54" font-weight="750">Claude/Codex</text>
  <text x="326" y="199" fill="#FFFFFF" font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="54" font-weight="750">Sub Autocomplete</text>
  <text x="329" y="252" fill="#E2E2FF" font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="23">Native IntelliJ ghost text from subscriptions you already have.</text>
  <g transform="translate(329 280)">
