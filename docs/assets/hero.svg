<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title description">
  <title id="title">Claude/Codex Sub Autocomplete</title>
  <desc id="description">Native IntelliJ autocomplete from an existing Claude Code or Codex subscription.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#24243F"/>
      <stop offset="0.55" stop-color="#3B3B77"/>
      <stop offset="1" stop-color="#5757D9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#111125" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="360" rx="28" fill="url(#background)"/>
  <circle cx="1090" cy="-5" r="190" fill="#FFFFFF" opacity="0.035"/>
  <circle cx="1030" cy="350" r="260" fill="#111125" opacity="0.09"/>
